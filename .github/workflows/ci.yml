name: SyncOS CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: syncos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d syncos_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/syncos_ci
      AUTH_JWT_SECRET: ci-validation-secret-12345
      API_BASE_URL: http://localhost:3100
      PORT: 3100
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Check E2E certification status
        run: node scripts/check-e2e-certification.js
      - name: Typecheck
        run: npm run typecheck
      - name: Build API
        run: npm run build -w @syncos/api
      - name: Build Worker
        run: npm run build -w @syncos/worker
      - name: Build Web
        run: npm run build -w @syncos/web
      - name: Database Verification
        run: npm run db:verify
      - name: Regression Tests
        run: npm test
      - name: Start API
        run: |
          npm run start -w @syncos/api &
          for i in {1..30}; do
            curl -fsS http://localhost:3100/health && exit 0
            sleep 1
          done
          exit 1
      - name: Security Smoke
        run: npm run security:smoke

  e2e:
    name: E2E PR Gate
    runs-on: ubuntu-latest
    needs: validate
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: syncos_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d syncos_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/syncos_e2e
      AUTH_JWT_SECRET: e2e-secret-for-ci
      API_BASE_URL: http://localhost:3137
      PORT: 3137
      SYNCOS_API_BASE_URL: http://localhost:3137
      WEB_BASE_URL: http://localhost:3138
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Build API
        run: npm run build -w @syncos/api
      - name: Build Web
        run: npm run build -w @syncos/web
      - name: Migrate E2E database
        run: npm run db:migrate -w @syncos/database
      - name: Seed base permissions/catalog
        run: npm run db:seed
      - name: Seed E2E database
        run: npm run seed:e2e-demo
      - name: Validate seed
        run: npm run e2e:seed-smoke
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start API
        run: |
          npm run start -w @syncos/api &
          for i in $(seq 1 30); do
            curl -fsS http://localhost:3137/health && break
            sleep 2
          done
          curl -fsS http://localhost:3137/health
      - name: Start Web
        env:
          PORT: 3138
        run: |
          npm run start -w @syncos/web &
          for i in $(seq 1 30); do
            curl -fsS http://localhost:3138 && break
            sleep 2
          done
          curl -fsS http://localhost:3138
      - name: E2E PR gate
        run: npm run e2e:ci:pr
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
